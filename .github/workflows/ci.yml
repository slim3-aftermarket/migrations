name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer test

  build-phar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/box compile
      - run: ./sl3-migrations.phar --help
      - uses: actions/upload-artifact@v4
        with:
          name: sl3-migrations-phar
          path: sl3-migrations.phar
